<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        td,
        th {
            border: 1px solid black;
            padding: 5px;
            text-align: center;
        }

        table {
            width: 300px;
            border-collapse: collapse;
            margin-bottom: 10px;
            background-color: white;
        }
    </style>
</head>

<body>
    <!-- 
       hierarquia de tabelas (simples)
       table = tabela                           tag= table
            table row = linha da tabela           tag = tr  
                table header = cabeçalho da tabel    tag = th
                table data = dado da tabela          tag= td

        estrutura para tabela grande
        
        thead 
        tbody
        tfoot
    -->
    <table>
        <tr>
            <td colspan="4">a</td>
            <td rowspan="4">b</td>
        </tr>
        <tr>
            <td rowspan="4">c</td>
            <td>d</td>
            <td>e</td>
            <td>f</td>
        </tr>
        <tr>
            <td>g</td>
            <td>h</td>
            <td>i</td>
        </tr>
        <tr>
            <td>j</td>
            <td>l</td>
            <td>m</td>
        </tr>
        <tr>
            <td colspan="4">n</td>
        </tr>
    </table>

</body>

</html>
