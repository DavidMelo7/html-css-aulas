<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        td,
        th {
            border: 1px solid black;
            padding: 5px;
            text-align: center;
        }

        table {
            width: 300px;
            border-collapse: collapse;
            margin-bottom: 10px;
            background-color: white;
        }
        th {
            background-color: rgb(167, 167, 167);
        }
        
        .mat {
            background-color: white;
        }

        #rolagem {
            overflow-x: auto;
        }
    </style>
</head>

<body>
    <!-- 
       hierarquia de tabelas (simples)
       table = tabela                           tag= table
            table row = linha da tabela           tag = tr  
                table header = cabeçalho da tabel    tag = th
                table data = dado da tabela          tag= td

        estrutura para tabela grande
        
        thead 
        tbody
        tfoot

        Colspan: Mescla para o lado (coluna).
        Rowspan: Mescla para baixo (linha).

        col: Indica que a célula é o cabeçalho de uma coluna
        row: Indica que a célula é o cabeçalho de uma linha
        colgroup: Define o cabeçalho para um grupo de colunas
        rowgroup: Define o cabeçalho para um grupo de linhas
    -->


    <div id="rolagem">
        <table>
            <tr>
                <th scope="col" rowspan="2">area</th>
                <th scope="col" rowspan="2">disciplinas</th>
                <th scope="colgroup" colspan="2">notas</th>
                <th scope="col" rowspan="2">media</th>
            </tr>
            <tr>
                <th scope="col">nota1</th>
                <th scope="col">nota2</th>
            </tr>
            <tr>
                <th scope="rowgroup" class="mat" rowspan="4">exatas</th>
                <td>matematica</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td>quimica</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td>fisica</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td>biologia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <th scope="colgroup" colspan="4">media de exatas</th>
                <th>0.0</th>
            </tr>
            <tr>
                <th scope="rowgroup" class="mat" rowspan="2">humanas</th>
                <td>historia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td>geografia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <th scope="colgroup" colspan="4">media humanas</th>
                <th>0.0</th>
            </tr>
        </table>
    </div>
</body>

</html>
