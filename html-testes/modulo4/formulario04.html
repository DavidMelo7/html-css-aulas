<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
    <style>
        *{
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <h1>notas</h1>
    <form action="cadastro.js">
        <div>
            <label for="inome">Nome: </label>
            <input type="text" name="nome" id="inome" placeholder="nome completo" required>
        </div>
        <div>
            <label for="inota">Nota: </label>
            <input type="number" name="nota" id="inota" placeholder="0 a 10" min="0" max="10" step="0.1" required>
        </div>
        <div>
            <label for="imes">periodo letivo</label>
            <input type="month" name="mes" id="imes">
        </div>
        <div>
            <input type="submit" value="enviar">
            <input type="reset" value="limpar">
        </div>
    </form>
</body>
</html>
