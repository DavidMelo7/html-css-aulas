<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="outras-telas.css">
</head>

<body>
    <main>
        <section id="tela">
            <div id="imagem">
            </div>
            <div id="cad">
                <form action="cadastro.js" method="post">
                    <h1>Login</h1>
                    <div>
                        <label for="iusuario">usuario: </label>
                        <input type="text" name="usuario" id="iusuario" required placeholder=" NOME DE USUARIO">
                    </div>
                    <div>
                        <label for="isenha">senha: </label>
                        <input type="password" name="senha" id="isenha" required minlength="8"
                            placeholder=" INSERIR A SENHA" autocomplete="current-password">
                    </div>
                    <div id="botao">
                        <input id="enviar" type="submit" value="Enviar">
                        <input id="limpar" type="reset" value="limpar">
                    </div>
                </form>
            </div>
            <div class="direitos">
                Direitos de David de Melo Ferreira.
                Visite meu <a href="https://github.com/DavidMelo7" target="_blank">GitHub</a>
            </div>
        </section>
    </main>

</body>

</html>
