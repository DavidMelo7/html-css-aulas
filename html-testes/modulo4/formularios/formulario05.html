<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form05</title>
    <style>
        *{
            font-family: Arial, Helvetica, sans-serif;
        }

        #time{
            width: 500px;
            background-color: rgba(180, 255, 189, 0.729);
        }

        legend {
            text-align: center;
        }
    </style>
</head>

<body>
    <h1>testes de formularios</h1>
    <form action="cadastro.js">
        <fieldset id="time">
            <legend>Qual seu time</legend>
            <input type="radio" name="time" id="itime" value="time1">
            <label for="itime">Palmeiras</label><br>
            <input type="radio" name="time" id="itime2" value="time2">
            <label for="itime2">Palestra italia</label>
        </fieldset>

        <fieldset id="time">
            <legend>selecio os times</legend>
            <input type="checkbox" name="palmeiras" id="ipalmeiras">
            <label for="ipalmeiras">Palmeiras</label>
            <input type="checkbox" name="palestra" id="ipalestra">
            <label for="ipalestra">Palestra italia</label>
        </fieldset>
    </form>

</body>

</html>
