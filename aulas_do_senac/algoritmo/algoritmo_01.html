<meta charset="UTF-8">

<script>
    // o programa calcula e exibe a velocidade media em km/h a partir da distancia percorrida em km e ddo tempo gasto em horas 

    distancia = window.prompt("qual a distancia percorrida");
    tempo = window.prompt("qual o tempo gasto em hora?");

    velocidade_media = distancia / tempo;

    window.alert("a velocidade média é de" + velocidade_media + "km/h")

</script>
